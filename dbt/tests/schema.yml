version: 2

sources:
  - name: public
    tables:
      - name: ngx_prices
      - name: global_prices
      - name: signals
      - name: signal_explanations
      - name: backtest_runs
      - name: backtest_trades

models:
  - name: stg_prices
    columns:
      - name: ticker
        tests: [not_null]
      - name: trade_date
        tests: [not_null]
      - name: close_price
        tests: [not_null]

  - name: int_returns
    columns:
      - name: ticker
        tests: [not_null]
      - name: trade_date
        tests: [not_null]

  - name: int_moving_averages
    columns:
      - name: ticker
        tests: [not_null]
      - name: trade_date
        tests: [not_null]

  - name: fct_features
    columns:
      - name: ticker
        tests: [not_null]
      - name: trade_date
        tests: [not_null]
      - name: close_price
        tests: [not_null]

  - name: stg_signals
    columns:
      - name: signal_id
        tests: [unique, not_null]
      - name: signal
        tests:
          - accepted_values:
              arguments:
                values: ["BUY", "SELL", "HOLD"]